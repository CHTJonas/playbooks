---
- name: Add Knot APT repository signing key
  ansible.builtin.get_url:
    url: https://deb.knot-dns.cz/apt.gpg
    dest: /etc/apt/keyrings/knot.gpg
    owner: root
    group: root
    mode: 0444
    backup: yes

- name: Add Knot APT repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/knot.gpg] https://deb.knot-dns.cz/knot-latest/ {{ ansible_facts['distribution_release'] }} main"
    filename: knot

- name: Install Knot server and utilities
  ansible.builtin.apt:
    install_recommends: no
    update_cache: yes
    pkg:
      - knot
      - knot-dnsutils

- name: Install knot config file
  ansible.builtin.copy:
    src: knot.conf
    dest: /etc/knot/knot.conf
    owner: root
    group: root
    mode: 0644
  notify: Restart Knot

- name: Enable and start systemd unit
  ansible.builtin.systemd:
    daemon_reload: yes
    name: knot.service
    state: started
    enabled: yes
    masked: no

- name: Install Knot firewall rule
  ansible.builtin.copy:
    src: knot-nft.conf
    dest: /etc/nftables/knot.conf
    owner: root
    group: root
    mode: 0755
  notify: Reload nftables

- name: Remove old DNS maintenance scripts
  ansible.builtin.file:
    path: "/usr/local/scripts/{{ item }}"
    state: absent
  with_items:
    - update-latham-ddns
    - update-old-vic-ddns

- name: Remove DNS maintenance scripts systemd service file
  ansible.builtin.file:
    path: /etc/systemd/system/dns-maint.service
    state: absent

- name: Remove DNS maintenance scripts systemd timer file
  ansible.builtin.file:
    path: /etc/systemd/system/dns-maint.timer
    state: absent

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: yes

- name: Install DS record management scripts
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /usr/local/scripts/
    owner: root
    group: root
    mode: 0755
  with_items:
    - check-cds-rrsets
    - check-ds-rrsets

- name: Create cron symlinks for DS record management scripts
  ansible.builtin.file:
    src: "/usr/local/scripts/{{ item }}"
    dest: "/etc/cron.daily/{{ item }}"
    state: link
    owner: root
    group: root
    mode: 0755
  with_items:
    - check-cds-rrsets
    - check-ds-rrsets

- name: Download mc executable (amd64)
  ansible.builtin.get_url:
    url: https://dl.xjupiter.net/binaries/mc-RELEASE.2023-10-07T15-07-38Z-amd64
    dest: /usr/local/bin/mc
    force: yes
    owner: root
    group: root
    mode: 0755
  when: ansible_facts["architecture"] == 'x86_64'

- name: Download mc executable (arm64)
  ansible.builtin.get_url:
    url: https://dl.xjupiter.net/binaries/mc-RELEASE.2023-10-07T15-07-38Z-arm64
    dest: /usr/local/bin/mc
    force: yes
    owner: root
    group: root
    mode: 0755
  when: ansible_facts["architecture"] == 'aarch64'

- name: Create mc config directory
  ansible.builtin.file:
    path: /root/.mc
    state: directory
    owner: root
    group: root
    mode: 0700

- name: Add mc config file
  ansible.builtin.template:
    src: config.json.j2
    dest: /root/.mc/config.json
    owner: root
    group: root
    mode: 0600

- name: Install DNS backup script
  ansible.builtin.copy:
    src: backup-dns
    dest: /usr/local/scripts/backup-dns
    owner: root
    group: root
    mode: 0755

- name: Create cron symlinks for DNS backup script
  ansible.builtin.file:
    src: /usr/local/scripts/backup-dns
    dest: /etc/cron.daily/backup-dns
    state: link
    owner: root
    group: root
    mode: 0755
